name: audit-trend

on:
  schedule:
    - cron: "17 3 * * *"  # nightly at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# H32: concurrency block — workflow_dispatch overlapping a scheduled run
# would otherwise race on the dated bot branch.
concurrency:
  group: audit-trend
  cancel-in-progress: false

jobs:
  rebuild:
    name: Rebuild audits/summary.json + trends.md
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq

      - name: Aggregate
        run: bash plugins/agentify/lib/audit_aggregate.sh audits --trends

      - name: Open PR if rollup changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet audits/summary.json audits/trends.md; then
            echo "no change to rollup; nothing to do"
            exit 0
          fi
          branch="bot/audit-trend-$(date -u +%Y-%m-%d)"
          git config user.name  "agentify-bot"
          git config user.email "agentify-bot@agentify-marketplace.invalid"
          git switch -c "$branch"
          git add audits/summary.json audits/trends.md
          git commit -m "chore(audits): nightly trend rollup"
          git push -u origin "$branch"
          body_tmp=$(mktemp)
          trap 'rm -f "$body_tmp"' EXIT
          bash bin/audit-trend-pr-body.sh >"$body_tmp"
          gh pr create \
            --base main --head "$branch" \
            --title "chore(audits): nightly trend rollup" \
            --body-file "$body_tmp"
