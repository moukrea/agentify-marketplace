name: audit-trend

on:
  schedule:
    - cron: "17 3 * * *"  # nightly at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    name: Rebuild audits/summary.json + trends.md
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq

      - name: Aggregate
        run: bash plugins/agentify/lib/audit_aggregate.sh audits --trends

      - name: Open PR if rollup changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet audits/summary.json audits/trends.md; then
            echo "no change to rollup; nothing to do"
            exit 0
          fi
          branch="bot/audit-trend-$(date -u +%Y-%m-%d)"
          git config user.name  "agentify-bot"
          git config user.email "bot@agentify-marketplace"
          git switch -c "$branch"
          git add audits/summary.json audits/trends.md
          git commit -m "chore(audits): nightly trend rollup"
          git push -u origin "$branch"
          gh pr create \
            --base main --head "$branch" \
            --title "chore(audits): nightly trend rollup" \
            --body "$(cat <<'EOF'
Automated rollup of audits/*.md by audit-trend.yml.

Regenerated by `bash plugins/agentify/lib/audit_aggregate.sh audits --trends`.

Reviewer checklist:
- [ ] Headline counts plausible.
- [ ] Recurring patterns (≥2 audits) make sense.
- [ ] No malformed audits silently dropped (check the workflow log).
EOF
)"
